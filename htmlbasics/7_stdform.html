<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>STD REG FORM</h1>
    <form>
      <fieldset>
        <legend>Student details</legend>
        <!-- fieldset heading -->
        <label for="name">NAME</label>
        <input id="name" type="name" placeholder="enter aapna naam" />
        <br /><br />
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="enter apna email" />
        <br /><br />
        <label for="courses">Select courses</label>
        <select id="courses">
          <optgroup label="Frontend">
            <option>HTML</option>
            <option>CSs</option>
            <option>js</option>
          </optgroup>
          <optgroup label="backend ">
            <option>Mongodb</option>
            <option>express js</option>
            <option>node js</option>
          </optgroup>
        </select>
      </fieldset>

      <br /><br />

      <fieldset>
        <legend>ADDRESS DETAILS</legend>
        <label for="address">Address</label>
        <textarea
          id="address"
          rows="5"
          cols=""
          placeholder="Apna address enter karo"
        ></textarea>
        <br /><br />
        <label for="city">CITY</label>
        <select id="city">
          <option>ngp</option>
          <option>raipur</option>
          <option>bhopal</option>
          <option>mumbai</option>
        </select>
      </fieldset>
      <br /><br />
      <button>submit</button>
    </form>

    <details>
      <summary>openme</summary>
      Lorem

    </details>

    <h1 contenteditable="true">hiiiii</h1>
    <h2 draggable="true">hi</h2>
  </body>
</html>
