<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="10"> <!--purple color ki propetty mei highlight hote hai--> 
        <caption>Students</caption>
        <colgroup> <!--to grp the colms and colour them specifically-->
        <col style="background-color: beige;">
        <col style="background-color: rgb(236, 139, 236);">
        <col style="background-color: lavender;">
        </colgroup>
        <thead> <!-- colms banata hai (heading >centre and bolds the content)--> 
            <tr> <!--row-wise-->
                <th>NAME</th><!--row ki heading -->
                <hr>
                <th><b>Rollnumber</b></th><!--row ki heading -->
                <th>branch</th><!--row ki heading -->

            </tr>
        </thead>
        <tbody>
            <tr>
                <td>raj</td><!--yeh respectively banata hai jo upar likhe hai uske sath -->
                <td>60</td>
                <td>CSE</td>
            </tr>
            <tr>
                <td>Pk</td>
                <td>46</td>
                <td>CSE</td>
            </tr>
            <tr>
                <td>Piyush</td>
                <td>50</td>
                <td>CSE</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="2">Total stds </th><!--colspan=2, telling the col to acquire 2 colms -->
                <td>3</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
