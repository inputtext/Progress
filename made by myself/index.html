<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creative Grid UI</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CUSTOM CURSOR -->
  <div class="cursor">
    <img src="left-click.png" alt="">
  </div>

  <!-- MAIN CONTAINER -->
  <div class="main">

    <!-- LEFT MENU -->
    <div class="menu">
      <div class="menu-box">WORK</div>
      <div class="menu-box">NEWS</div>
      <div class="menu-box">SHOP</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="title">Time</div>

      <div class="line"></div>

      <div class="circle"></div>

      <div class="line"></div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="material">MATERIAL</div>

      <div class="grid">

        <div class="item">🔑</div>
        <div class="item">📦</div>
        <div class="item">🧊</div>
        <div class="item">🍼</div>

        <div class="item">🪵</div>
        <div class="item">📖</div>
        <div class="item">🏔️</div>
        <div class="item">🧲</div>

      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
