<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./singup.html">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111615.png" alt="">
            <span>slack</span>
        </div>

        <ul class="nav-links">
            <li>Features</li>
            <li>Solutions</li>
            <li>Enterprise</li>
            <li>Resources</li>
            <li>Pricing</li>
            <li  class="signin-btn">sign in</li>
        </ul>

        <div class="nav-buttons">
            <button class="outline-btn">REQUEST A DEMO</button>
            <button class="filled-btn">GET STARTED</button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">

        <h1>
            All your people and AI agents
            <br>
            working together.
        </h1>

        <p>
            Slack connects your team. Slackbot multiplies what they can do.
        </p>

        <div class="hero-buttons">
            <button class="filled-btn">GET STARTED</button>
            <button class="outline-btn">
                FIND YOUR SUBSCRIPTION →
            </button>
        </div>

        <div class="companies">
            <span>gm</span>
            <span>OpenAI</span>
            <span>Target</span>
            <span>Paramount</span>
            <span>Stripe</span>
            <span>IBM</span>
        </div>

        <div class="mockup">
            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200"
                alt="">
        </div>

    </section>


    <script src="./script.js"></script>

</body>
</html>
