<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Art Cards</title>
  <link rel="stylesheet" href="a3.css"/>
</head>
<body>

  <div class="container">

    <div class="top">
      <h2>Explore Art Work</h2>
      <p>See All</p>
    </div>

    <div class="cards">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=500" alt="">
        <div class="info">
          <h3>Monocular</h3>
          <span>54.8k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500" alt="">
        <div class="info">
          <h3>Horns Mask</h3>
          <span>32.4k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1507146426996-ef05306b995a?w=500" alt="">
        <div class="info">
          <h3>Light Moon</h3>
          <span>86.8k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500" alt="">
        <div class="info">
          <h3>Skull Wire</h3>
          <span>78.9k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6?w=500" alt="">
        <div class="info">
          <h3>Spiderman</h3>
          <span>24.8k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500" alt="">
        <div class="info">
          <h3>DeadPool</h3>
          <span>59.7k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?w=500" alt="">
        <div class="info">
          <h3>White Eye</h3>
          <span>45.7k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1525547719571-a2d4ac8945e2?w=500" alt="">
        <div class="info">
          <h3>Plastic Spinal</h3>
          <span>98.6k ♡</span>
        </div>
        <button>Place Bid</button>
      </div>

    </div>
  </div>

</body>
</html>
