<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

    <div class="app">

        <!-- Header -->
        <header>

            <h1>📋 Tasks</h1>

            <button class="theme-btn">
                🌙
            </button>

        </header>

        <!-- Add Task -->
        <section class="add-task">

            <input
                type="text"
                id="taskInput"
                placeholder="Add a new task..."
            >

            <select id="category">

                <option value="Study">
                    Study
                </option>

                <option value="Work">
                    Work
                </option>

                <option value="Personal">
                    Personal
                </option>

                <option value="College">
                    College
                </option>

            </select>

            <button id="addTaskBtn">
                Add Task
            </button>

        </section>

        <!-- Stats -->
        <section class="stats">

            <div class="stat-card">

                <h3>Total Tasks</h3>

                <p id="totalTasks">
                    0
                </p>

            </div>

            <div class="stat-card">

                <h3>Completed</h3>

                <p id="completedTasks">
                    0
                </p>

            </div>

            <div class="stat-card">

                <h3>Pending</h3>

                <p id="pendingTasks">
                    0
                </p>

            </div>

        </section>

        <!-- Search -->
        <section class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="🔍 Search tasks..."
            >

        </section>

        <!-- Task List -->
        <section
            class="task-list"
            id="taskList">

            <!-- Tasks will be generated by JS -->

        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
